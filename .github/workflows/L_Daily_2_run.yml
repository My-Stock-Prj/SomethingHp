# 이 코드의 파일명 L_Daily_2_run.yml
name: daily step 2

on:
  workflow_run:
    workflows: ["daily step 1"]
    types:
        - completed
  workflow_dispatch: 

jobs:
  market-and-report:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas gspread google-auth finance-datareader pyarrow requests numpy

      # 1. 지수 데이터 업데이트 (MACRO 가점의 기초 데이터)
      - name: Step 2-1 - Update Market DB (Global Indices)
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python L_Daily_IDX.py

      # 2. ADB 통합 및 업데이트
      - name: Step 2-2 - Merge and Update ADB Base
        run: python L_Daily_ADB_Update.py

      # 3. 분석 리포트 발행 및 Tracker 데이터 생성
      - name: Step 3 - Generate Analysis Report
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          # C_Global_Config.py의 환경변수 연동 체계 준수
          K_API_SLEEP: ${{ vars.K_API_SLEEP || 0.1 }}
          TOP_N_KOSPI: ${{ vars.TOP_N_KOSPI || 200 }}
          TOP_N_KOSDAQ: ${{ vars.TOP_N_KOSDAQ || 150 }}
          BACKFILL_DAYS: ${{ vars.BACKFILL_DAYS || 40 }}
          ADB_KEEP_DAYS: ${{ vars.ADB_KEEP_DAYS || 40 }}
        run: python L_Daily_ADB_Report.py

      # 4. 신규: 사후 검증 및 전략 유효성 진단 (Analyzer) [수정: GCP 인증 변수 추가]
      - name: Step 4 - Strategy Post-Validation (Analyzer)
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python L_Daily_ADB_Analyzer.py

      # 5. 모든 변경 사항 한 번에 커밋
      - name: Final Commit and Push
        if: always() 
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Git Repo_map.md 정의 경로의 모든 데이터 파일 추가
          git add StockPrj0/*.parquet
          
          git commit -m "Auto Update: Market Index, ADB Base, and Strategy Tracker [skip ci]" || echo "No changes to commit"
          git push origin main
